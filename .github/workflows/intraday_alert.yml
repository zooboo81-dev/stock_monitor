name: Intraday Alert

on:
  schedule:
    # 台灣 9:00-13:35 每 5 分鐘 = UTC 01:00-05:35
    - cron: '*/5 1-5 * * 1-5'
    # 7/14 加：台灣 14:30 收盤後補檢查一次（--force 忽略時段限制）
    - cron: '30 6 * * 1-5'
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Run alert
        env:
          PUSHOVER_USER_KEY: ${{ secrets.PUSHOVER_USER_KEY }}
          PUSHOVER_API_TOKEN: ${{ secrets.PUSHOVER_API_TOKEN }}
        # 收盤後 14:30 檢查用 --force（其他時段照常）
        run: |
          HOUR=$(date -u +%H)
          MIN=$(date -u +%M)
          # UTC 06:30 = 台灣 14:30 → force
          if [ "$HOUR" = "06" ] && [ "$MIN" = "30" ]; then
            python intraday_alert.py --force
          else
            python intraday_alert.py
          fi

      - name: Commit
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add data/intraday_state.json data/notifications.jsonl
          git diff --staged --quiet && echo "無變動" || (git commit -m "chore: intraday alert" && git push)
