name: Morning Briefing

on:
  schedule:
    # 台灣 08:50 = UTC 00:50（週一至五）
    - cron: '50 0 * * 1-5'
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Run briefing
        run: python morning_briefing.py

      - name: Commit
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add data/notifications.jsonl data/morning_briefing.html
          git diff --staged --quiet && echo "無變動" || (git commit -m "chore: morning briefing" && git push)
